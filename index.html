<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading New - Live Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar" style="background:#181a20; padding:15px; border-bottom:2px solid #f0b90b; color:#f0b90b; text-align:center; font-weight:bold; font-size:24px;">
        TRADING NEW
    </nav>

    <div class="container" style="background:#0b0e11; color:white; padding:20px; text-align:center; min-height:100vh;">
        <div class="card" style="background:#1e2329; border:1px solid #333; padding:20px; border-radius:10px;">
            <h2 style="color:#848e9c;">NIFTY 50 LIVE</h2>
            <div class="price" style="font-size:40px; color:#0ecb81; font-weight:bold;">19,XXX.XX</div>
            <p>RSI: 55 | MACD: Bullish</p>
        </div>

        <div class="jarvis-card" style="margin-top:20px; padding:15px; border:1px dashed #f0b90b; background:rgba(240,185,11,0.1); border-radius:10px;">
            <p>🤖 <strong>Jarvis AI:</strong> ईश्वर भाई, मार्केट अभी संभलकर चलने वाला है। सही मौके का इंतज़ार करें!</p>
        </div>

        <div style="margin-top:30px;">
            <button style="background:#0ecb81; color:white; padding:15px 40px; border:none; border-radius:5px; font-weight:bold; margin-right:10px;">BUY</button>
            <button style="background:#f6465d; color:white; padding:15px 40px; border:none; border-radius:5px; font-weight:bold;">SELL</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
